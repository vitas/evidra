name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Run tests
        run: go test ./... -count=1

      - name: Run race detector
        run: go test -race ./... -count=1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=5m
          verify: false

      - name: Build binaries
        run: |
          go build -o bin/evidra ./cmd/evidra
          go build -o bin/evidra-mcp ./cmd/evidra-mcp

      - name: Run real-world e2e acceptance
        run: make e2e

      - name: Run contract integration suite
        run: make test-contracts

      - name: Run inspector transport suite
        run: make test-mcp-inspector-ci

      - name: Run signal validation scenarios
        run: make test-signals

      - name: Check signal validation harness
        run: bash tests/test_signal_validation_harness.sh

      - name: Upload signal validation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signals-validation
          path: experiments/results/signals/**
          if-no-files-found: error

      - name: Verify generated prompts
        run: make prompts-verify

      - name: Check doc command paths
        run: bash scripts/check-doc-commands.sh

      - name: Check test naming consistency
        run: bash tests/test_fixture_snapshot_names.sh

      - name: Check OSS dataset provenance
        run: bash tests/test_oss_dataset_provenance.sh

      - name: Check benchmark case metadata
        run: bash tests/test_benchmark_case_metadata.sh

      - name: Check OSS dataset corpus
        run: bash tests/test_oss_dataset_corpus.sh

      - name: Check bench-add corpus scaffolding
        run: bash tests/test_bench_add_corpus_scaffold.sh

      - name: Check acceptance corpus promotion
        run: bash tests/test_acceptance_corpus_promotion.sh

      - name: Check unified artifact layout
        run: bash tests/test_unified_artifact_layout.sh

      - name: Validate benchmark dataset
        run: make benchmark-validate

      - name: Check benchmark contract snapshot drift
        run: make benchmark-check-contracts EVIDRA_BIN=bin/evidra

      - name: Generate benchmark coverage report
        run: make benchmark-coverage

      - name: Upload benchmark coverage report
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-coverage
          path: tests/benchmark/COVERAGE.md
