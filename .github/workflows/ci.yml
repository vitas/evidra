name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Run tests
        run: go test ./... -count=1

      - name: Run race detector
        run: go test -race ./... -count=1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=5m

      - name: Build binaries
        run: |
          go build -o bin/evidra ./cmd/evidra
          go build -o bin/evidra-mcp ./cmd/evidra-mcp

      - name: Check doc command paths
        run: bash scripts/check-doc-commands.sh

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run E2E tests
        run: make e2e

      - name: Run MCP Inspector tests
        run: make test-mcp-inspector-ci

      - name: Validate benchmark source composition
        run: bash tests/benchmark/scripts/validate-source-composition.sh

      - name: Upload inspector log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspector-log
          path: tests/inspector/out/latest.log
          if-no-files-found: ignore
