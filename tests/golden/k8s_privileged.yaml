apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-pod
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debug
  template:
    metadata:
      labels:
        app: debug
    spec:
      hostPID: true
      hostNetwork: true
      containers:
      - name: debug
        image: busybox:1.36
        securityContext:
          privileged: true
        command: ["sleep", "infinity"]
        volumeMounts:
        - name: host-root
          mountPath: /host
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
