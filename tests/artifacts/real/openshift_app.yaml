---
# OpenShift application deployed via oc apply
# Uses OCP-specific resources: DeploymentConfig, Route, BuildConfig, ImageStream
apiVersion: v1
kind: Namespace
metadata:
  name: webapp
  labels:
    openshift.io/cluster-monitoring: "true"
  annotations:
    openshift.io/description: "Production web application"
    openshift.io/display-name: "Web App"
  uid: "12345678-abcd-efgh-ijkl-mnopqrstuvwx"
  resourceVersion: "554433"
  creationTimestamp: "2026-01-20T09:00:00Z"
  managedFields:
  - manager: oc
    operation: Update
    time: "2026-01-20T09:00:00Z"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-config
  namespace: webapp
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: '{"old":"stale"}'
data:
  APP_ENV: production
  LOG_FORMAT: json
  RATE_LIMIT: "1000"
  CORS_ORIGINS: "https://webapp.example.com"
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: webapp
  namespace: webapp
  labels:
    app: webapp
spec:
  lookupPolicy:
    local: true
  tags:
  - name: latest
    from:
      kind: DockerImage
      name: registry.corp.com/webapp:latest
    importPolicy:
      scheduled: true
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: webapp
  namespace: webapp
  labels:
    app: webapp
spec:
  source:
    type: Git
    git:
      uri: https://github.com/corp/webapp.git
      ref: main
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        name: nodejs:18-ubi8
        namespace: openshift
      env:
      - name: NPM_MIRROR
        value: https://registry.npmjs.org
  output:
    to:
      kind: ImageStreamTag
      name: webapp:latest
  triggers:
  - type: ImageChange
  - type: ConfigChange
  - type: GitHub
    github:
      secretReference:
        name: webapp-github-webhook
---
apiVersion: apps.openshift.io/v1
kind: DeploymentConfig
metadata:
  name: webapp
  namespace: webapp
  labels:
    app: webapp
    app.openshift.io/runtime: nodejs
  annotations:
    app.openshift.io/vcs-uri: https://github.com/corp/webapp.git
    app.openshift.io/vcs-ref: main
spec:
  replicas: 3
  strategy:
    type: Rolling
    rollingParams:
      maxSurge: 1
      maxUnavailable: 0
      timeoutSeconds: 600
  selector:
    app: webapp
  triggers:
  - type: ImageChange
    imageChangeParams:
      automatic: true
      containerNames:
      - webapp
      from:
        kind: ImageStreamTag
        name: webapp:latest
  - type: ConfigChange
  template:
    metadata:
      labels:
        app: webapp
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: webapp-sa
      securityContext:
        runAsNonRoot: true
      containers:
      - name: webapp
        image: webapp:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: webapp-config
              key: APP_ENV
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: webapp-db-credentials
              key: url
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: webapp
  labels:
    app: webapp
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: webapp-tls
spec:
  selector:
    app: webapp
  ports:
  - name: http
    port: 8080
    targetPort: http
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webapp-sa
  namespace: webapp
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.primary: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"webapp"}}'
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: webapp
  namespace: webapp
  labels:
    app: webapp
  annotations:
    haproxy.router.openshift.io/timeout: 60s
    router.openshift.io/cookie_name: webapp-session
spec:
  host: webapp.apps.ocp.example.com
  to:
    kind: Service
    name: webapp
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webapp
  namespace: webapp
spec:
  scaleTargetRef:
    apiVersion: apps.openshift.io/v1
    kind: DeploymentConfig
    name: webapp
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
