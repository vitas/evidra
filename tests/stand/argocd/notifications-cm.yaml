apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.webhook.evidra: |
    url: http://host.k3d.internal:8090/v1/hooks/argocd
    headers:
      - name: Authorization
        value: Bearer __EVIDRA_WEBHOOK_SECRET_ARGOCD__
      - name: X-Evidra-API-Key
        value: __EVIDRA_TENANT_API_KEY__
  template.evidra-sync-started: |
    webhook:
      evidra:
        method: POST
        body: |
          {
            "event": "sync_started",
            "app_name": "{{.app.metadata.name}}",
            "app_namespace": "{{.app.spec.destination.namespace}}",
            "revision": "{{.app.status.sync.revision}}",
            "initiated_by": "{{if .app.status.operationState.operation.initiatedBy.username}}{{.app.status.operationState.operation.initiatedBy.username}}{{else}}argocd{{end}}",
            "operation_id": "{{.app.status.operationState.operation.sync.revision}}"
          }
  template.evidra-sync-completed: |
    webhook:
      evidra:
        method: POST
        body: |
          {
            "event": "sync_completed",
            "app_name": "{{.app.metadata.name}}",
            "app_namespace": "{{.app.spec.destination.namespace}}",
            "revision": "{{.app.status.sync.revision}}",
            "initiated_by": "{{if .app.status.operationState.operation.initiatedBy.username}}{{.app.status.operationState.operation.initiatedBy.username}}{{else}}argocd{{end}}",
            "operation_id": "{{.app.status.operationState.operation.sync.revision}}",
            "phase": "{{.app.status.operationState.phase}}",
            "message": "{{.app.status.operationState.message}}"
          }
  trigger.on-evidra-sync-started: |
    - description: Send Evidra sync start notification
      oncePer: app.status.operationState.operation.sync.revision
      when: app.status.operationState.phase == 'Running'
      send:
        - evidra-sync-started
  trigger.on-evidra-sync-completed: |
    - description: Send Evidra sync completion notification
      oncePer: app.status.operationState.operation.sync.revision
      when: app.status.operationState.phase in ['Succeeded', 'Failed', 'Error']
      send:
        - evidra-sync-completed
