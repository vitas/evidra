services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: evidra
      POSTGRES_PASSWORD: evidra
      POSTGRES_DB: evidra
    ports:
      - "5432:5432"
    volumes:
      - stand_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidra"]
      interval: 5s
      timeout: 3s
      retries: 12

  evidra-api:
    build:
      context: ../../..
      dockerfile: Dockerfile.api
    ports:
      - "8090:8080"
    environment:
      DATABASE_URL: postgres://evidra:evidra@postgres:5432/evidra?sslmode=disable
      EVIDRA_API_KEY: ${EVIDRA_API_KEY}
      EVIDRA_INVITE_SECRET: ${EVIDRA_INVITE_SECRET}
      EVIDRA_WEBHOOK_SECRET_ARGOCD: ${EVIDRA_WEBHOOK_SECRET_ARGOCD}
      EVIDRA_SIGNING_MODE: optional
      EVIDRA_SIGNING_KEY: ${EVIDRA_SIGNING_KEY}
      LISTEN_ADDR: :8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  stand_pgdata:
