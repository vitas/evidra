apiVersion: apps/v1
kind: Deployment
metadata:
  name: stand-nginx-prod
  namespace: workloads-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stand-nginx-prod
  template:
    metadata:
      labels:
        app: stand-nginx-prod
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
