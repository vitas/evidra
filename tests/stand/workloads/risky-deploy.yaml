apiVersion: v1
kind: Pod
metadata:
  name: risky-stand-pod
  namespace: workloads-dev
spec:
  containers:
    - name: risky
      image: nginx:1.27-alpine
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
        runAsUser: 0
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
        type: Directory
