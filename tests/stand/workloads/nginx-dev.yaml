apiVersion: apps/v1
kind: Deployment
metadata:
  name: stand-nginx-dev
  namespace: workloads-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stand-nginx-dev
  template:
    metadata:
      labels:
        app: stand-nginx-dev
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            readOnlyRootFilesystem: true
