version: "2"
linters:
  default: standard
  enable:
    - funlen
    - gocyclo
    - nestif
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Printf
    funlen:
      lines: 130
      statements: 80
      ignore-comments: true
    gocyclo:
      min-complexity: 24
    nestif:
      min-complexity: 8
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - gocyclo
          - nestif
